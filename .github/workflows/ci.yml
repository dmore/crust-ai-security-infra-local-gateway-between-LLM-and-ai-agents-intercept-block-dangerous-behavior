name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: nilaway (nil safety)
        run: |
          go install go.uber.org/nilaway/cmd/nilaway@latest
          nilaway ./...

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Verify PIE binary
        run: |
          go build -buildmode=pie -o crust-pie .
          file crust-pie | grep -i "pie\|shared object\|position independent" || echo "Warning: PIE not detected (may be default on this platform)"
          rm crust-pie

      - name: Fuzz tests (30s each, top 5 critical targets)
        run: |
          go test ./internal/rules/... -fuzz=FuzzEngineBypass -fuzztime=30s -short
          go test ./internal/rules/... -fuzz=FuzzBuiltinRuleBypass -fuzztime=30s -short
          go test ./internal/rules/... -fuzz=FuzzNormalizeUnicode -fuzztime=30s -short
          go test ./internal/rules/... -fuzz=FuzzLoopbackRegex -fuzztime=30s -short
          go test ./internal/rules/... -fuzz=FuzzMCPToolBypass -fuzztime=30s -short

      - name: License compliance
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./... --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,Zlib,Elastic-2.0

  test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Build
        run: go build ./...

      - name: Build (notui)
        run: go build -tags notui ./...

      - name: Unit tests (with race detector and coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./... -short

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false

  # macOS and FreeBSD run only on main to reduce CI costs (macOS is 10x billing).
  test-expensive:
    name: Go Test (${{ matrix.os }})
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Build
        run: go build ./...

      - name: Build (notui)
        run: go build -tags notui ./...

      - name: Unit tests (with race detector)
        run: go test -race ./... -short

  test-freebsd:
    name: Go Test (FreeBSD)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          prepare: |
            pkg install -y go
          run: |
            go version
            go build ./...
            go build -tags notui ./...
            go test ./... -short

  e2e:
    name: E2E Tests (MCP stdio + HTTP + ACP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pre-install MCP servers
        run: |
          npm install -g @modelcontextprotocol/server-filesystem
          npm install -g @modelcontextprotocol/server-everything

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: MCP E2E tests (stdio + HTTP)
        run: go test ./internal/mcpgateway/... -v -run E2E -timeout 180s

      - name: ACP E2E tests
        run: go test ./internal/acpwrap/... -v -run E2E -timeout 60s

  docker-test:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t crust-test .

      - name: Start container
        run: |
          docker run -d --name crust-ci -p 9090:9090 crust-test
          sleep 3

      - name: Health check
        run: curl -sf http://localhost:9090/health

      - name: Graceful shutdown
        run: |
          docker stop --time 5 crust-ci
          EXIT_CODE=$(docker inspect crust-ci --format='{{.State.ExitCode}}')
          [ "$EXIT_CODE" = "0" ] || { echo "Exit code: $EXIT_CODE"; docker logs crust-ci; exit 1; }

      - name: Logs on failure
        if: failure()
        run: docker logs crust-ci 2>&1 || true

