name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8

      - name: go vet
        run: go vet ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: nilaway (nil safety)
        run: |
          go install go.uber.org/nilaway/cmd/nilaway@latest
          nilaway ./...


  test:
    name: Go Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Build
        run: go build ./...

      - name: Build (notui)
        run: go build -tags notui ./...

      - name: Unit tests (with race detector)
        run: go test -race ./... -short

  # macOS and FreeBSD run only on main to reduce CI costs (macOS is 10x billing).
  test-expensive:
    name: Go Test (${{ matrix.os }})
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - name: Install gitleaks (DLP Tier 2)
        run: go install github.com/zricethezav/gitleaks/v8@latest

      - name: Build
        run: go build ./...

      - name: Build (notui)
        run: go build -tags notui ./...

      - name: Unit tests (with race detector)
        run: go test -race ./... -short

  test-freebsd:
    name: Go Test (FreeBSD)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/freebsd-vm@v1
        with:
          release: '15.0'
          usesh: true
          prepare: |
            pkg install -y go
          run: |
            go version
            go build ./...
            go build -tags notui ./...
            go test ./... -short

  e2e:
    name: E2E Tests (MCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pre-install MCP filesystem server
        run: npm install -g @modelcontextprotocol/server-filesystem

      - name: E2E tests
        run: go test ./internal/mcpgateway/... -v -run E2E -timeout 120s

  docker-test:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t crust-test .

      - name: Start container
        run: |
          docker run -d --name crust-ci -p 9090:9090 crust-test
          sleep 3

      - name: Health check
        run: curl -sf http://localhost:9090/health

      - name: Graceful shutdown
        run: |
          docker stop --time 5 crust-ci
          EXIT_CODE=$(docker inspect crust-ci --format='{{.State.ExitCode}}')
          [ "$EXIT_CODE" = "0" ] || { echo "Exit code: $EXIT_CODE"; docker logs crust-ci; exit 1; }

      - name: Logs on failure
        if: failure()
        run: docker logs crust-ci 2>&1 || true

