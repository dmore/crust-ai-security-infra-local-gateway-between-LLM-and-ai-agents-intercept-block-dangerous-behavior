name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          additional_files: 'install.sh install_openclaw.sh scripts/install-common.sh'
          severity: warning

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

      - name: go mod tidy (check for stale dependencies)
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || { echo "go mod tidy changed go.mod/go.sum — run 'go mod tidy' locally and commit"; exit 1; }

      - name: go fix (check for pending modernizations)
        run: |
          go fix ./...
          git diff --exit-code || { echo "go fix found pending modernizations — run 'go fix ./...' locally and commit the changes"; exit 1; }

      - name: go generate (schema drift check)
        run: |
          go generate ./...
          git diff --exit-code || { echo "go generate produced changes — run 'go generate ./...' locally and commit"; exit 1; }

      - name: rule-coverage (ensure rules have unit + fuzz tests)
        run: bash scripts/check-rule-coverage.sh

      - name: rule-lint (validate security.yaml syntax)
        run: |
          go build -o /tmp/crust-lint .
          /tmp/crust-lint lint-rules

      - name: Cache Go tools (govulncheck, nilaway)
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-govulncheck-nilaway-v1

      - name: govulncheck
        run: |
          command -v govulncheck || go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: nilaway (nil safety)
        run: |
          command -v nilaway || go install go.uber.org/nilaway/cmd/nilaway@latest
          nilaway ./...

  security:
    name: Security Checks
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache pip (semgrep)
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}-v1

      - name: semgrep (SAST)
        run: |
          pip install semgrep
          semgrep scan --config auto --error \
            --exclude-rule go.lang.security.audit.dangerous-exec-command.dangerous-exec-command \
            .

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify PIE binary
        run: |
          go build -buildmode=pie -o crust-pie .
          file crust-pie | grep -qi "pie\|shared object\|position independent"
          rm crust-pie

      - name: Build fuzz test binaries
        run: |
          go test -c -o /tmp/rules.fuzz ./internal/rules/
          go test -c -o /tmp/httpproxy.fuzz ./internal/httpproxy/
          go test -c -o /tmp/config.fuzz ./internal/config/
          go test -c -o /tmp/mcpdiscover.fuzz ./internal/mcpdiscover/
          go test -c -o /tmp/pathutil.fuzz ./internal/pathutil/
          go test -c -o /tmp/security.fuzz ./internal/security/
          go test -c -o /tmp/selfprotect.fuzz ./internal/selfprotect/
          mkdir -p /tmp/fuzz-cache

      - name: Restore fuzz corpus cache
        uses: actions/cache@v5
        with:
          path: /tmp/fuzz-cache
          key: fuzz-corpus-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ runner.os }}-

      - name: Fuzz tests (critical, 30s each — every PR)
        run: |
          # Critical fuzz targets (30s each, sequential — these are the most
          # security-sensitive and get more fuzzing time).
          /tmp/rules.fuzz -test.fuzz=FuzzEngineBypass -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache
          /tmp/rules.fuzz -test.fuzz=FuzzBuiltinRuleBypass -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache
          /tmp/rules.fuzz -test.fuzz=FuzzNormalizeUnicode -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache
          /tmp/rules.fuzz -test.fuzz=FuzzLoopbackRegex -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache
          /tmp/rules.fuzz -test.fuzz=FuzzMCPToolBypass -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache
          /tmp/rules.fuzz -test.fuzz=FuzzConfusableBypass -test.fuzztime=30s -test.short -test.fuzzcachedir=/tmp/fuzz-cache

      - name: Fuzz tests (full suite, 15s each — parallelized)
        run: |
          # Run full suite in parallel batches (2 at a time) to cut wall time
          # while keeping enough CPU per fuzzer for meaningful coverage.
          # Each fuzz target gets its own process so failures are isolated.
          # 15s to avoid spurious "context deadline exceeded" from the Go fuzz
          # framework when CPU-contended shutdown races the timer.
          parallel_fuzz() {
            local bin="$1"; shift
            local pids=()
            local targets=()
            local failed=0
            for target in "$@"; do
              "$bin" -test.fuzz="$target" -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache &
              pids+=($!)
              targets+=("$target")
              # Cap concurrency at 2 for better per-target CPU utilization.
              if [ "${#pids[@]}" -ge 2 ]; then
                for i in "${!pids[@]}"; do
                  if ! wait "${pids[$i]}"; then
                    echo "::error::Fuzz target ${targets[$i]} FAILED"
                    failed=1
                  fi
                done
                pids=()
                targets=()
              fi
            done
            for i in "${!pids[@]}"; do
              if ! wait "${pids[$i]}"; then
                echo "::error::Fuzz target ${targets[$i]} FAILED"
                failed=1
              fi
            done
            return $failed
          }
          rc=0
          parallel_fuzz /tmp/rules.fuzz \
            FuzzNormalizerBypass FuzzParseShellCommands FuzzMatcherConsistency \
            FuzzExtractBashCommand FuzzIsSuspiciousInput FuzzContainsObfuscation \
            FuzzCommandRegexBypass FuzzHostRegexBypass \
            FuzzJSONUnicodeEscapeBypass FuzzEvasionDetectionBypass FuzzGlobCommandBypass \
            FuzzPipelineExtraction FuzzContentConfusableBypass FuzzVariableExpansionEvasion \
            FuzzShapeDetectionBypass \
            || rc=1
          # FuzzNormalAgentFalsePositive and FuzzWebSearchURLBypass create a
          # full engine per iteration (with DLP/gitleaks) — too slow for the
          # 12s parallel batch. Run sequentially with more time.
          /tmp/rules.fuzz -test.fuzz=FuzzNormalAgentFalsePositive -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache || rc=1
          /tmp/rules.fuzz -test.fuzz=FuzzWebSearchURLBypass -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache || rc=1
          # FuzzPipeBypass and FuzzForkBombDetection need constrained memory and
          # single worker to avoid OOM when running alongside other fuzz targets.
          GOMEMLIMIT=2GiB /tmp/rules.fuzz -test.fuzz=FuzzPipeBypass -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache -test.parallel=1 || rc=1
          GOMEMLIMIT=2GiB /tmp/rules.fuzz -test.fuzz=FuzzForkBombDetection -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache -test.parallel=1 || rc=1
          parallel_fuzz /tmp/httpproxy.fuzz \
            FuzzParseSSEEventData FuzzCopyHeaders FuzzStripHopByHopHeaders \
            FuzzParseEvent FuzzApplyResultToToolCalls \
            FuzzBufferEvent FuzzForceNonStreaming \
            || rc=1
          parallel_fuzz /tmp/config.fuzz FuzzKeystoreJSON || rc=1
          parallel_fuzz /tmp/mcpdiscover.fuzz FuzzMCPConfigPatch || rc=1
          parallel_fuzz /tmp/pathutil.fuzz FuzzExpandMSYS2Path || rc=1
          # FuzzInterceptAnthropicResponse initializes a rule engine (shell
          # workers) whose startup cost can exceed 12s under CPU contention.
          # Run standalone with 15s to avoid spurious deadline-exceeded failures.
          /tmp/security.fuzz -test.fuzz=FuzzInterceptAnthropicResponse -test.fuzztime=15s -test.short -test.fuzzcachedir=/tmp/fuzz-cache || rc=1
          parallel_fuzz /tmp/selfprotect.fuzz FuzzSelfProtectBypass || rc=1
          exit $rc

      - name: Upload failing fuzz corpus
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failing-seeds
          path: |
            testdata/fuzz/
            internal/rules/testdata/fuzz/
            internal/httpproxy/testdata/fuzz/
            internal/config/testdata/fuzz/
            internal/mcpdiscover/testdata/fuzz/
            internal/pathutil/testdata/fuzz/
            internal/security/testdata/fuzz/
            internal/selfprotect/testdata/fuzz/
          retention-days: 30
          if-no-files-found: ignore

  test:
    name: Go Test (${{ matrix.os }})
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (notui tag check)
        run: go build -tags notui ./...

      - name: Install PSScriptAnalyzer (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Unit tests (with race detector and coverage)
        run: go test -race -short -coverprofile coverage.out -covermode atomic ./...

      - name: PSScriptAnalyzer — lint pwsh bootstrap script (Windows only)
        if: matrix.os == 'windows-latest'
        run: |
          go test -v -run 'TestPSScriptAnalyzer' ./internal/rules/...

      - name: PS worker fuzz tests (Windows only — pwsh is available on windows-latest)
        if: matrix.os == 'windows-latest'
        run: |
          go test ./internal/rules/ -fuzz=FuzzPSWorker_NoCrash -fuzztime=30s -short
          go test ./internal/rules/ -fuzz=FuzzExtractor_PSCommand -fuzztime=30s -short

      - name: Upload failing fuzz corpus (Windows)
        if: failure() && matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-failing-seeds-windows
          path: internal/rules/testdata/fuzz/
          retention-days: 30
          if-no-files-found: ignore

  libcrust:
    name: libcrust (CGO_ENABLED=0)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build (pure Go, no CGO)
        run: CGO_ENABLED=0 go build -tags libcrust ./internal/... ./pkg/...

      - name: Cross-compile (iOS arm64)
        run: GOOS=ios GOARCH=arm64 CGO_ENABLED=0 go build -tags libcrust ./pkg/libcrust/

      - name: Test
        run: CGO_ENABLED=0 go test -tags libcrust ./pkg/libcrust/...

  # gomobile bind produces the actual Libcrust.xcframework for iOS.
  # Runs only on main (macOS runners are 10x cost).
  gomobile:
    name: gomobile bind (iOS)
    needs: [libcrust]
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: gomobile bind
        run: |
          gomobile bind \
            -target ios \
            -tags libcrust \
            -o build/ios/Libcrust.xcframework \
            ./pkg/libcrust/

      - name: Verify xcframework
        run: |
          test -d build/ios/Libcrust.xcframework
          ls -la build/ios/Libcrust.xcframework/

      - name: Resolve Swift package
        working-directory: ios/CrustKit
        run: xcodebuild -resolvePackageDependencies -scheme CrustKit

      - name: Test CrustKit (iOS Simulator)
        working-directory: ios/CrustKit
        run: |
          # Pick first available iPhone simulator
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json,sys
          d=json.load(sys.stdin)['devices']
          for rt,devs in d.items():
            if 'iOS' in rt:
              for dev in devs:
                if 'iPhone' in dev['name']:
                  print(dev['name']); sys.exit(0)
          print('iPhone 16')
          ")
          echo "Using simulator: $DEST"
          xcodebuild test \
            -scheme CrustKit \
            -destination "platform=iOS Simulator,name=$DEST,OS=latest" \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult

      - name: Upload xcframework
        uses: actions/upload-artifact@v7
        with:
          name: Libcrust.xcframework
          path: build/ios/Libcrust.xcframework
          retention-days: 14

  # Platform-specific tests run only on main to reduce CI costs.
  # macOS runners are 10x billing; MSYS2 adds a second windows-latest runner.
  # Jobs always complete (SUCCESS) so they can be listed as required status checks;
  # the expensive steps are skipped on non-main branches.
  test-expensive:
    name: Go Test (${{ matrix.name }})
    needs: [lint]
    runs-on: ${{ github.ref == 'refs/heads/main' && matrix.os || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            msys2: false
          - os: windows-latest
            name: Windows MSYS2
            msys2: true
    steps:
      - name: Skip on non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "Platform tests run on main only — skipping to reduce CI costs"

      - uses: actions/checkout@v6
        if: github.ref == 'refs/heads/main'

      # setup-go must run before msys2/setup-msys2 so the toolchain is in PATH
      # when the MSYS2 shell inherits it via path-type: inherit.
      - uses: actions/setup-go@v6
        if: github.ref == 'refs/heads/main'
        with:
          go-version-file: go.mod

      - uses: msys2/setup-msys2@v2
        if: github.ref == 'refs/heads/main' && matrix.msys2
        with:
          msystem: MINGW64
          update: false
          path-type: inherit  # inherit Windows PATH so the Go toolchain is visible

      - name: Build (notui tag check)
        if: github.ref == 'refs/heads/main' && !matrix.msys2
        run: go build -tags notui ./...

      - name: Unit tests (with race detector)
        if: github.ref == 'refs/heads/main' && !matrix.msys2
        env:
          GOEXPERIMENT: goroutineleakprofile
        run: go test -race -short ./...

      - name: Unit tests (MSYS2 — MSYSTEM set by msys2/setup-msys2)
        if: github.ref == 'refs/heads/main' && matrix.msys2
        shell: msys2 {0}
        env:
          GOEXPERIMENT: goroutineleakprofile
        run: go test ./internal/rules/... ./internal/pathutil/... -short -count=1 -timeout 300s

  test-freebsd:
    name: Go Test (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - name: Skip on non-main branches
        if: github.ref != 'refs/heads/main'
        run: echo "FreeBSD tests run on main only — skipping to reduce CI costs"

      - uses: actions/checkout@v6
        if: github.ref == 'refs/heads/main'

      - uses: vmactions/freebsd-vm@v1
        if: github.ref == 'refs/heads/main'
        with:
          release: '15.0'
          usesh: true
          prepare: |
            # FreeBSD ports ships Go 1.25 — install 1.26.1 directly to match go.mod
            fetch -o /tmp/go.tar.gz https://dl.google.com/go/go1.26.1.freebsd-amd64.tar.gz
            tar -C /usr/local -xzf /tmp/go.tar.gz
            ln -sf /usr/local/go/bin/go    /usr/local/bin/go
            ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt
            rm /tmp/go.tar.gz
            # install.sh requires bash and git
            pkg install -y bash git
          run: |
            go version
            # Mark checkout dir safe — VM user differs from checkout owner after rsync
            git config --global --add safe.directory '*'
            # FreeBSD 15 enables ASLR by default, which is incompatible with
            # Go's race detector (ThreadSanitizer). Disable ASLR for CI so
            # -race works correctly.
            sysctl kern.elf64.aslr.enable=0
            sysctl kern.elf64.aslr.pie_enable=0
            # Test install.sh on FreeBSD (builds from source)
            bash install.sh --local . --prefix /usr/local/bin --no-font --no-completion
            which crust && crust version
            go test -race -short ./...

  e2e:
    name: E2E Tests (MCP stdio + HTTP + ACP)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Pre-install MCP servers
        run: |
          npm install -g @modelcontextprotocol/server-filesystem
          npm install -g @modelcontextprotocol/server-everything

      - name: Install crust
        run: bash install.sh --local . --prefix "$(go env GOPATH)/bin" --no-font --no-completion

      - name: MCP E2E tests (stdio + HTTP)
        run: go test -race ./internal/mcpgateway/... -v -run E2E -timeout 180s

      - name: ACP E2E tests
        run: go test -race ./internal/acpwrap/... -v -run E2E -timeout 60s

  e2e-install:
    name: Install & Agent Config E2E
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and install crust
        run: |
          bash install.sh --local . --prefix "$HOME/.local/bin" --no-font --no-completion
          # Rebuild with e2e-test version tag for test assertions
          go build -ldflags "-X main.Version=e2e-test" -o "$HOME/.local/bin/crust" .
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify binary works
        run: crust version

      - name: Create fake OpenClaw config
        run: |
          mkdir -p "$HOME/.openclaw"
          printf '{"baseUrl":"https://api.openai.com","apiKey":"sk-test"}' \
            > "$HOME/.openclaw/openclaw.json"

      - name: Start crust daemon (auto mode, no upstream required)
        run: |
          crust start --auto --no-color
          # Poll for the backup file created by PatchAgentConfigs (max 15s)
          n=0
          while [ "$n" -lt 15 ]; do
            test -f "$HOME/.openclaw/openclaw.json.crust-backup" && break
            sleep 1; n=$((n + 1))
          done
          test -f "$HOME/.openclaw/openclaw.json.crust-backup" || {
            echo "ERROR: timeout waiting for daemon to patch OpenClaw config"
            exit 1
          }

      - name: Verify OpenClaw config was patched
        run: |
          patched=$(jq -r '.baseUrl' "$HOME/.openclaw/openclaw.json")
          echo "baseUrl after start: $patched"
          echo "$patched" | grep -q "localhost:9090" || {
            echo "ERROR: baseUrl not patched to localhost:9090 (got: $patched)"
            cat "$HOME/.openclaw/openclaw.json"
            exit 1
          }
          test -f "$HOME/.openclaw/openclaw.json.crust-backup" || {
            echo "ERROR: backup file missing"
            exit 1
          }

      - name: Stop crust daemon
        run: crust stop

      - name: Verify OpenClaw config was restored
        run: |
          restored=$(jq -r '.baseUrl' "$HOME/.openclaw/openclaw.json")
          echo "baseUrl after stop: $restored"
          test "$restored" = "https://api.openai.com" || {
            echo "ERROR: baseUrl not restored (got: $restored)"
            cat "$HOME/.openclaw/openclaw.json"
            exit 1
          }
          test ! -f "$HOME/.openclaw/openclaw.json.crust-backup" || {
            echo "ERROR: backup file was not removed after restore"
            exit 1
          }

      - name: Uninstall crust
        run: bash install.sh --purge

      - name: Verify uninstall cleaned up
        run: |
          test ! -f "$HOME/.local/bin/crust"      || { echo "ERROR: binary not removed"; exit 1; }
          test ! -f "$HOME/.crust/crust.pid"       || { echo "ERROR: PID file not removed"; exit 1; }
          test ! -f "$HOME/.crust/crust.log"       || { echo "ERROR: log file not removed"; exit 1; }

      - name: Logs on failure
        if: failure()
        run: |
          cat "$HOME/.crust/crust.log" 2>/dev/null || echo "(no log file found)"
          echo "--- openclaw config ---"
          cat "$HOME/.openclaw/openclaw.json" 2>/dev/null || echo "(no openclaw config)"
          echo "--- backup ---"
          cat "$HOME/.openclaw/openclaw.json.crust-backup" 2>/dev/null || echo "(no backup)"

  e2e-install-windows:
    name: Install & Agent Config E2E (Windows)
    needs: [lint]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and install crust binary from current branch
        shell: pwsh
        run: |
          $installDir = Join-Path $env:LOCALAPPDATA "Crust"
          $dataDir    = Join-Path $env:USERPROFILE  ".crust"
          New-Item -ItemType Directory -Path $installDir                     -Force | Out-Null
          New-Item -ItemType Directory -Path $dataDir                        -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $dataDir "rules.d")  -Force | Out-Null
          go build -ldflags "-X main.Version=e2e-test" -o (Join-Path $installDir "crust.exe") .
          "$installDir" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Verify binary works
        shell: pwsh
        run: crust version

      - name: Create fake OpenClaw config
        shell: pwsh
        run: |
          $dir = Join-Path $env:USERPROFILE ".openclaw"
          New-Item -ItemType Directory -Path $dir -Force | Out-Null
          '{"baseUrl":"https://api.openai.com","apiKey":"sk-test"}' |
            Set-Content (Join-Path $dir "openclaw.json") -Encoding utf8

      - name: Start crust daemon (auto mode, no upstream required)
        shell: pwsh
        run: |
          crust start --auto --no-color
          # Poll for the backup file created by PatchAgentConfigs (max 15s)
          $backup = Join-Path $env:USERPROFILE ".openclaw\openclaw.json.crust-backup"
          $n = 0
          while ($n -lt 15 -and -not (Test-Path $backup)) { Start-Sleep 1; $n++ }
          if (-not (Test-Path $backup)) {
            Write-Error "ERROR: timeout waiting for daemon to patch OpenClaw config"
            exit 1
          }

      - name: Verify OpenClaw config was patched
        shell: pwsh
        run: |
          $config  = Join-Path $env:USERPROFILE ".openclaw\openclaw.json"
          $backup  = "$config.crust-backup"
          $patched = (Get-Content $config | ConvertFrom-Json).baseUrl
          Write-Host "baseUrl after start: $patched"
          if ($patched -notlike "*localhost:9090*") {
            Write-Error "ERROR: baseUrl not patched to localhost:9090 (got: $patched)"
            Get-Content $config
            exit 1
          }
          if (-not (Test-Path $backup)) {
            Write-Error "ERROR: backup file missing"
            exit 1
          }

      - name: Stop crust daemon
        shell: pwsh
        run: crust stop

      - name: Verify OpenClaw config was restored
        shell: pwsh
        run: |
          $config   = Join-Path $env:USERPROFILE ".openclaw\openclaw.json"
          $backup   = "$config.crust-backup"
          $restored = (Get-Content $config | ConvertFrom-Json).baseUrl
          Write-Host "baseUrl after stop: $restored"
          if ($restored -ne "https://api.openai.com") {
            Write-Error "ERROR: baseUrl not restored (got: $restored)"
            Get-Content $config
            exit 1
          }
          if (Test-Path $backup) {
            Write-Error "ERROR: backup file was not removed after restore"
            exit 1
          }

      - name: Uninstall crust
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\install.ps1" -Purge

      - name: Verify uninstall cleaned up
        shell: pwsh
        run: |
          $bin    = Join-Path $env:LOCALAPPDATA "Crust\crust.exe"
          $pidFile = Join-Path $env:USERPROFILE  ".crust\crust.pid"
          $log    = Join-Path $env:USERPROFILE  ".crust\crust.log"
          if (Test-Path $bin) { Write-Error "ERROR: binary not removed"; exit 1 }
          if (Test-Path $pidFile) { Write-Error "ERROR: PID file not removed"; exit 1 }
          if (Test-Path $log) { Write-Error "ERROR: log file not removed"; exit 1 }

      - name: Logs on failure
        if: failure()
        shell: pwsh
        run: |
          $log    = Join-Path $env:USERPROFILE ".crust\crust.log"
          $config = Join-Path $env:USERPROFILE ".openclaw\openclaw.json"
          $backup = "$config.crust-backup"
          Write-Host "--- crust log ---"
          if (Test-Path $log)    { Get-Content $log }    else { Write-Host "(no log file found)" }
          Write-Host "--- openclaw config ---"
          if (Test-Path $config) { Get-Content $config } else { Write-Host "(no openclaw config)" }
          Write-Host "--- backup ---"
          if (Test-Path $backup) { Get-Content $backup } else { Write-Host "(no backup)" }

  docker-test:
    name: Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t crust-test .

      - name: Start container and wait for healthy
        run: |
          docker run -d --name crust-ci -p 9090:9090 crust-test
          n=0; while [ "$n" -lt 15 ]; do
            curl -sf http://localhost:9090/health && exit 0
            sleep 1
            n=$((n + 1))
          done
          echo "Health check failed after 15 attempts"
          docker logs crust-ci
          exit 1

      - name: DLP block test – AWS key in message content must return 403
        run: |
          BODY='{"model":"claude-3-5-sonnet-20241022","max_tokens":1,"messages":[{"role":"user","content":"Use this key: AKIAIOSFODNN7EXAMPLE"}]}'
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:9090/v1/messages \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "DLP block status: $STATUS"
          [ "$STATUS" = "403" ] || { echo "Expected 403, got $STATUS"; docker logs crust-ci; exit 1; }

      - name: Benign request must not be blocked (expect 502, not 403)
        run: |
          BODY='{"model":"claude-3-5-sonnet-20241022","max_tokens":1,"messages":[{"role":"user","content":"hello"}]}'
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:9090/v1/messages \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Benign request status: $STATUS"
          if [ "$STATUS" = "403" ]; then echo "Benign request incorrectly blocked (403)"; docker logs crust-ci; exit 1; fi

      - name: Graceful shutdown
        run: |
          docker stop --timeout 5 crust-ci
          EXIT_CODE=$(docker inspect crust-ci --format='{{.State.ExitCode}}')
          [ "$EXIT_CODE" = "0" ] || { echo "Exit code: $EXIT_CODE"; docker logs crust-ci; exit 1; }

      - name: Logs on failure
        if: failure()
        run: docker logs crust-ci 2>&1 || true

  benchmark:
    name: Benchmark (PR only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks (quick)
        run: |
          go test -bench="Extractor|Normalizer|Matcher|JSONParsing|ContainsRegex" \
            -benchmem -count=3 -short \
            ./internal/rules/... \
            ./internal/httpproxy/... \
            ./internal/security/...
